<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>专业课助教</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root{
      --bg:#f3f5f7;
      --panel:#ffffff;
      --text:#1f2d3d;
      --muted:#7a869a;
      --brand:#1aa7ff;
      --brand2:#5b7cfa;
      --bubble-user:#1aa7ff;
      --bubble-bot:#ffffff;
      --border:#e6e9ef;
      --shadow:0 10px 30px rgba(31,45,61,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(26,167,255,.18), transparent 60%),
                  radial-gradient(1000px 500px at 90% 10%, rgba(91,124,250,.18), transparent 55%),
                  var(--bg);
      color:var(--text);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .app{
      width:100%;
      max-width:980px;
      height:min(820px, 92vh);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(90deg, rgba(26,167,255,.10), rgba(91,124,250,.10));
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:240px;
    }
    .logo{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 8px 18px rgba(26,167,255,.25);
    }
    .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .title strong{font-size:14px}
    .title span{font-size:12px;color:var(--muted);margin-top:3px}
    .top-actions{
      margin-left:auto;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      background:#fff;
    }
    .btn{
      border:none;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      color:#fff;
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .coursebar{
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px 14px;
      border-bottom:1px solid var(--border);
      background:#fff;
      flex-wrap:wrap;
    }
    .coursebar select,
    .coursebar input{
      height:34px;
      border:1px solid var(--border);
      border-radius:8px;
      padding:0 10px;
      font-size:13px;
      background:#fff;
      color:var(--text);
    }
    .coursebar input{width:180px}
    .coursebar .mode{
      display:flex;
      border:1px solid var(--border);
      border-radius:8px;
      overflow:hidden;
      height:34px;
    }
    .coursebar .mode button{
      border:0;
      background:#fff;
      padding:0 12px;
      cursor:pointer;
      color:var(--muted);
    }
    .coursebar .mode button.active{
      background:rgba(26,167,255,.12);
      color:var(--brand);
      font-weight:600;
    }

    .chat{
      flex:1;
      overflow:auto;
      padding:16px 14px 10px;
      background:linear-gradient(180deg, rgba(26,167,255,.05), transparent 40%),
                 linear-gradient(0deg, rgba(91,124,250,.05), transparent 45%);
    }
    .dayline{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin:6px 0 14px;
    }
    .msg{
      display:flex;
      gap:10px;
      margin:10px 0;
      align-items:flex-end;
    }
    .msg.user{justify-content:flex-end}
    /* 关键：只让“消息内容容器”(排除头像)在 flex 中可伸缩，避免被压到“1 个字宽”导致竖排换行 */
    .msg > div:not(.avatar){
      flex:1;
      min-width:0;
    }
    .msg.user > div:not(.avatar){
      display:flex;
      flex-direction:column;
      align-items:flex-end;
    }
    .avatar{
      min-width:34px;
      width:auto;
      height:34px;
      border-radius:10px;
      padding:0 8px;
      background:#e9eef7;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;
      line-height:1;
      white-space:nowrap;
      color:#3b4a5a;
      flex:0 0 auto;
    }
    .avatar.bot{background:linear-gradient(135deg, rgba(26,167,255,.18), rgba(91,124,250,.18))}
    .bubble{
      max-width:min(720px, 76%);
      display:inline-block;
      border-radius:14px;
      padding:10px 12px;
      border:1px solid var(--border);
      background:var(--bubble-bot);
      position:relative;
      line-height:1.55;
      font-size:14px;
      white-space:normal;
      overflow-wrap: break-word;
    }
    .msg.bot .bubble{
      max-width:min(880px, 94%);
      padding:14px 16px;
    }
    .msg.user .bubble{white-space:pre-wrap}
    .msg.user .bubble{
      background:var(--bubble-user);
      color:#fff;
      border-color:transparent;
    }
    .meta{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
    }
    .msg.user .meta{color:rgba(255,255,255,.85)}
    details.progress{
      margin-top:8px;
      border:1px dashed rgba(122,134,154,.45);
      border-radius:12px;
      padding:8px 10px;
      background:rgba(122,134,154,.06);
    }
    details.progress summary{
      cursor:pointer;
      user-select:none;
      color:var(--muted);
      font-size:12px;
    }
    .progress ul{margin:8px 0 0 18px;padding:0}
    .progress li{margin:4px 0;font-size:12px;color:#56657a}

    .answer-images{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .answer-images img{
      display: block;
      max-width: min(100%, 600px);
      max-height: 600px;
      width: auto;
      height: auto;
      border-radius:12px;
      border:1px solid var(--border);
      box-shadow:0 10px 24px rgba(31,45,61,.10);
      background:#fff;
    }
    .answer-images a{
      font-size:12px;
      color:var(--muted);
      text-decoration:none;
      word-break:break-all;
    }
    .answer-text{
      white-space:normal;
      font-size:15px;
      line-height:1.78;
    }
    .answer-text h1,
    .answer-text h2,
    .answer-text h3,
    .answer-text h4,
    .answer-text h5,
    .answer-text h6{
      margin:12px 0 8px;
      line-height:1.3;
      font-weight:700;
    }
    .answer-text h1{font-size:20px}
    .answer-text h2{font-size:18px}
    .answer-text h3{font-size:16px}
    .answer-text h4,
    .answer-text h5,
    .answer-text h6{font-size:15px}
    .answer-text p{margin:8px 0}
    .answer-text .formula-line{
      margin:14px 0;
      padding:2px 0;
      text-align:center;
      overflow-x:auto;
      white-space:normal;
    }
    .answer-text ul,
    .answer-text ol{margin:8px 0 8px 22px;padding:0}
    .answer-text li{margin:4px 0}
    .answer-text table{
      width:100%;
      border-collapse:collapse;
      margin:10px 0;
      font-size:13px;
      white-space:normal;
    }
    .answer-text th,
    .answer-text td{
      border:1px solid var(--border);
      padding:6px 8px;
      text-align:left;
      vertical-align:top;
    }
    .answer-text th{background:#f7f9fc;font-weight:700}
    .answer-text hr{border:0;border-top:1px solid var(--border);margin:14px 0}
    .answer-text code{
      font-family:Consolas, "Liberation Mono", Menlo, monospace;
      background:#f4f6f9;
      border:1px solid #e8edf3;
      border-radius:5px;
      padding:1px 4px;
    }
    .answer-text pre{
      overflow:auto;
      background:#f4f6f9;
      border:1px solid #e8edf3;
      border-radius:8px;
      padding:10px;
      white-space:pre;
    }
    .answer-text blockquote{
      margin:8px 0;
      padding:6px 10px;
      border-left:3px solid var(--brand);
      background:#f7fbff;
      color:#425466;
    }
    mjx-container[jax="SVG"][display="true"]{
      margin:10px 0 !important;
      overflow-x:auto;
      overflow-y:hidden;
      max-width:100%;
    }

    .typing{
      display:inline-flex;gap:6px;align-items:center;
    }
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:#9aa6b2;
      animation:bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.6}
      40%{transform:translateY(-5px);opacity:1}
    }

    .composer{
      border-top:1px solid var(--border);
      padding:12px 14px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:#fff;
    }
    textarea{
      flex:1;
      resize:none;
      min-height:44px;
      max-height:140px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      outline:none;
      font-size:14px;
      line-height:1.5;
    }
    textarea:focus{border-color:rgba(26,167,255,.6); box-shadow:0 0 0 3px rgba(26,167,255,.12)}
    .attach{
      width:44px;
      height:44px;
      border:1px solid var(--border);
      border-radius:12px;
      cursor:pointer;
      font-size:18px;
      color:#3b4a5a;
      background:#fff;
    }
    .attach.has-files{
      border-color:rgba(26,167,255,.55);
      color:var(--brand);
      background:rgba(26,167,255,.08);
    }
    .app.drag-over .chat,
    .app.drag-over .composer{
      outline:2px dashed rgba(26,167,255,.5);
      outline-offset:-6px;
      background:rgba(26,167,255,.06);
    }
    .attachment-tray{
      display:none;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      padding:10px 14px 0;
      background:#fff;
      border-top:1px solid var(--border);
    }
    .attachment-tray.active{display:flex}
    .attachment-chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      max-width:260px;
      height:30px;
      padding:0 8px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#f7f9fc;
      color:#3b4a5a;
      font-size:12px;
    }
    .attachment-name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .attachment-remove{
      border:0;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      font-size:16px;
      line-height:1;
      padding:0;
    }
    .file-input-hidden{display:none}
    .send{
      width:88px;
      height:44px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      color:#fff;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
    }
    .send:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      padding:0 14px 12px;
      color:var(--muted);
      font-size:12px;
      background:#fff;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      border:1px solid var(--border);
      padding:1px 6px;
      border-radius:6px;
      background:#f7f9fc;
      color:#3b4a5a;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <strong id="appTitle">专业课助教</strong>
          <span id="subTitle">请选择课程 · 专业课助教</span>
        </div>
      </div>
      <div class="top-actions">
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;color:var(--muted);margin-right:10px;">
          <input type="checkbox" id="streamToggle" checked> 流式输出
        </label>
        <span class="pill" id="apiPill">API: 未连接</span>
        <button class="btn" id="btnClear">清空对话</button>
      </div>
    </div>

    <div class="coursebar">
      <select id="courseSelect" title="选择课程"></select>
      <button class="btn" id="btnCreateCourse">新建课程</button>
      <div class="mode" aria-label="回答模式">
        <button id="modeQa" class="active" type="button">答疑</button>
        <button id="modeExam" type="button">出卷</button>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="dayline">今天</div>
      <div class="msg bot">
        <div class="avatar bot assistant-avatar">助教</div>
        <div>
          <div class="bubble" id="welcomeText">你好，我是专业课助教。你可以直接提问，也可以让我根据课程资料和往年试卷辅助复习。</div>
          <div class="meta">提示：可以问“这道题怎么做？”或“根据往年试卷出一份模拟卷”。</div>
        </div>
      </div>
    </div>

    <div class="attachment-tray" id="attachmentTray"></div>
    <div class="composer" id="composer">
      <input type="file" id="queryFiles" class="file-input-hidden" multiple accept=".png,.jpg,.jpeg,.webp,.bmp,.gif,.pdf,.txt,.md,.csv,.json,.py,.java,.cpp,.c,.h,.html,.css,.js">
      <button class="attach" id="attachBtn" type="button" title="上传图片或文件">＋</button>
      <textarea id="input" placeholder="请输入问题（Enter 发送，Shift+Enter 换行）"></textarea>
      <button class="send" id="send">发送</button>
    </div>
    <div class="hint" id="hint">快捷键：<span class="kbd">Enter</span> 发送，<span class="kbd">Shift</span>+<span class="kbd">Enter</span> 换行</div>
  </div>

  <script>
    // 默认同源；如你把页面单独打开（file://），可改成 http://127.0.0.1:8001
    const API_BASE = `${location.protocol}//${location.host}`.includes('http') ? `${location.protocol}//${location.host}` : 'http://127.0.0.1:8001';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const attachBtn = document.getElementById('attachBtn');
    const queryFiles = document.getElementById('queryFiles');
    const attachmentTray = document.getElementById('attachmentTray');
    const appEl = document.querySelector('.app');
    const hintEl = document.getElementById('hint');
    const apiPill = document.getElementById('apiPill');
    const btnClear = document.getElementById('btnClear');
    const streamToggle = document.getElementById('streamToggle');
    const appTitle = document.getElementById('appTitle');
    const subTitle = document.getElementById('subTitle');
    const welcomeText = document.getElementById('welcomeText');
    const courseSelect = document.getElementById('courseSelect');
    const btnCreateCourse = document.getElementById('btnCreateCourse');
    const modeQa = document.getElementById('modeQa');
    const modeExam = document.getElementById('modeExam');
    let currentMode = localStorage.getItem('kb_mode') || 'qa';
    let pendingFiles = [];
    let dragDepth = 0;
    const MAX_PENDING_FILES = 8;

    // Session ID Logic
    let sessionId = localStorage.getItem('kb_session_id');
    if (!sessionId) {
      sessionId = 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('kb_session_id', sessionId);
    }
    let currentCourseId = localStorage.getItem('kb_course_id') || '';
    let currentCourseName = localStorage.getItem('kb_course_name') || '';

    function assistantName(){
      const name = (currentCourseName || '').trim();
      return name ? `${name}助教` : '专业课助教';
    }

    function updateAssistantBrand(){
      const name = assistantName();
      document.title = name;
      appTitle.textContent = name;
      subTitle.textContent = currentCourseName ? `${currentCourseName} · 专业课助教` : '请选择课程 · 专业课助教';
      welcomeText.textContent = `你好，我是${name}。你可以直接提问，也可以让我根据课程资料和往年试卷辅助复习。`;
      document.querySelectorAll('.assistant-avatar').forEach(el => {
        el.textContent = name;
      });
    }

    function setMode(mode){
      currentMode = mode;
      localStorage.setItem('kb_mode', mode);
      modeQa.classList.toggle('active', mode === 'qa');
      modeExam.classList.toggle('active', mode === 'exam');
      inputEl.placeholder = mode === 'exam'
        ? '描述你想要的模拟卷，例如：根据往年期末卷出一份微积分模拟试卷'
        : '请输入问题（Enter 发送，Shift+Enter 换行）';
    }

    async function loadCourses(){
      try{
        const res = await fetch(`${API_BASE}/courses`);
        if(!res.ok) return;
        const data = await res.json();
        const courses = Array.isArray(data.courses) ? data.courses : [];
        courseSelect.innerHTML = '';
        for(const course of courses){
          const opt = document.createElement('option');
          opt.value = course.course_id;
          opt.textContent = course.course_name || course.course_id;
          opt.dataset.name = course.course_name || '';
          courseSelect.appendChild(opt);
        }
        if(courses.length > 0){
          const exists = courses.some(c => c.course_id === currentCourseId);
          const selected = exists ? courses.find(c => c.course_id === currentCourseId) : courses[0];
          currentCourseId = selected.course_id;
          currentCourseName = selected.course_name || selected.course_id;
          localStorage.setItem('kb_course_id', currentCourseId);
          localStorage.setItem('kb_course_name', currentCourseName);
          courseSelect.value = currentCourseId;
          updateAssistantBrand();
        }
        if(courses.length === 0) updateAssistantBrand();
      }catch(_){}
    }

    function openImportPage(){
      const host = location.hostname || '127.0.0.1';
      window.location.href = `${location.protocol}//${host}:8001/import.html`;
    }

    function scrollToBottom(){
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function nowTime(){
      const d = new Date();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function formatTime(ts){
      if(!ts) return nowTime();
      const d = new Date(Number(ts) * 1000);
      if(Number.isNaN(d.getTime())) return nowTime();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function renderInlineMarkdown(text){
      let s = escapeHtml(text);
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/(^|[\s（(])\*([^*\n]+)\*([\s）).。？！,，;；:]|$)/g, '$1<em>$2</em>$3');
      return s;
    }

    function stripMathDecorators(line){
      return String(line || '')
        .trim()
        .replace(/^>\s*/, '')
        .replace(/^[-*]\s+/, '')
        .replace(/^\d+\.\s+/, '')
        .replace(/^#+\s+/, '')
        .trim();
    }

    function mathEnvironmentName(line){
      const match = stripMathDecorators(line).match(/^\\begin\{([a-zA-Z*]+)\}/);
      return match ? match[1] : '';
    }

    function isMathEnvironmentStart(line){
      const env = mathEnvironmentName(line);
      return /^(cases|aligned|align\*?|array|matrix|pmatrix|bmatrix|vmatrix|equation\*?|split|gather\*?)$/.test(env);
    }

    function isLikelyFormulaLine(line){
      const cleaned = stripMathDecorators(line);
      if(!cleaned) return false;
      if(cleaned.length > 700) return false;
      if(isMathEnvironmentStart(cleaned)) return true;
      if(/^\\(boxed|frac|omega|sum|int|lim|sqrt|left|right)/.test(cleaned)) return true;

      const chinese = (cleaned.match(/[\u4e00-\u9fff]/g) || []).length;
      const hasMathCommand = /\\(frac|Rightarrow|rightarrow|begin|end|boxed|quad|text|cdot|leq|geq|neq|omega|xi|in|sum|int|sqrt|left|right)/.test(cleaned);
      const hasMathSymbols = /[=^_{}]|[+\-*/×÷]|≤|≥|≠|≈/.test(cleaned);
      const startsLikeMath = /^(\(?\d+\)?\s*)?([A-Za-z]\\?|'|\\[A-Za-z]+|\(|\[|{|[0-9.-])/.test(cleaned);

      if(chinese <= 4 && startsLikeMath && hasMathSymbols){
        return true;
      }
      if(chinese <= 10 && hasMathCommand && hasMathSymbols){
        return true;
      }
      return false;
    }

    function wrapDisplayMath(math){
      const cleaned = String(math || '').trim();
      if(!cleaned) return '';
      return `<div class="formula-line">\\[${escapeHtml(cleaned)}\\]</div>`;
    }

    function renderMarkdown(text){
      const source = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const lines = source.split('\n');
      const html = [];
      let paragraph = [];
      let listType = '';
      let listOpen = false;
      let codeOpen = false;
      let codeLines = [];

      function flushParagraph(){
        if(paragraph.length > 0){
          html.push(`<p>${renderInlineMarkdown(paragraph.join(' '))}</p>`);
          paragraph = [];
        }
      }
      function closeList(){
        if(listOpen){
          html.push(`</${listType}>`);
          listOpen = false;
          listType = '';
        }
      }
      function isTableStart(index){
        return index + 1 < lines.length
          && /^\s*\|.*\|\s*$/.test(lines[index])
          && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[index + 1]);
      }
      function renderTable(start){
        const header = lines[start].trim().replace(/^\||\|$/g, '').split('|').map(x => x.trim());
        let index = start + 2;
        const rows = [];
        while(index < lines.length && /^\s*\|.*\|\s*$/.test(lines[index])){
          rows.push(lines[index].trim().replace(/^\||\|$/g, '').split('|').map(x => x.trim()));
          index++;
        }
        html.push('<table><thead><tr>' + header.map(c => `<th>${renderInlineMarkdown(c)}</th>`).join('') + '</tr></thead><tbody>');
        for(const row of rows){
          html.push('<tr>' + row.map(c => `<td>${renderInlineMarkdown(c)}</td>`).join('') + '</tr>');
        }
        html.push('</tbody></table>');
        return index - 1;
      }

      for(let i = 0; i < lines.length; i++){
        const raw = lines[i];
        const line = raw.trim();

        if(codeOpen){
          if(line.startsWith('```')){
            html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
            codeOpen = false;
            codeLines = [];
          }else{
            codeLines.push(raw);
          }
          continue;
        }

        if(line.startsWith('```')){
          flushParagraph();
          closeList();
          codeOpen = true;
          codeLines = [];
          continue;
        }

        if(line === ''){
          flushParagraph();
          closeList();
          continue;
        }

        if(line === '---' || line === '***'){
          flushParagraph();
          closeList();
          html.push('<hr>');
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.+)$/);
        if(heading){
          flushParagraph();
          closeList();
          const level = Math.min(heading[1].length, 6);
          html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        if(line === '$$'){
          flushParagraph();
          closeList();
          const math = [];
          i++;
          while(i < lines.length && lines[i].trim() !== '$$'){
            math.push(lines[i]);
            i++;
          }
          html.push(wrapDisplayMath(math.join('\n')));
          continue;
        }

        if(line.startsWith('$$') && line.endsWith('$$') && line.length > 4){
          flushParagraph();
          closeList();
          html.push(wrapDisplayMath(line.slice(2, -2)));
          continue;
        }

        if(line.startsWith('$$')){
          flushParagraph();
          closeList();
          const math = [line.slice(2)];
          i++;
          while(i < lines.length && !lines[i].trim().endsWith('$$')){
            math.push(lines[i]);
            i++;
          }
          if(i < lines.length){
            math.push(lines[i].replace(/\$\$\s*$/, ''));
          }
          html.push(wrapDisplayMath(math.join('\n')));
          continue;
        }

        if(isMathEnvironmentStart(line)){
          flushParagraph();
          closeList();
          const env = mathEnvironmentName(line);
          const math = [stripMathDecorators(raw)];
          i++;
          while(i < lines.length && !lines[i].includes(`\\end{${env}}`)){
            math.push(lines[i]);
            i++;
          }
          if(i < lines.length){
            math.push(lines[i]);
          }
          html.push(wrapDisplayMath(math.join('\n')));
          continue;
        }

        if(isLikelyFormulaLine(line)){
          flushParagraph();
          closeList();
          html.push(wrapDisplayMath(stripMathDecorators(line)));
          continue;
        }

        if(isTableStart(i)){
          flushParagraph();
          closeList();
          i = renderTable(i);
          continue;
        }

        const unordered = line.match(/^[-*]\s+(.+)$/);
        const ordered = line.match(/^\d+\.\s+(.+)$/);
        if(unordered || ordered){
          flushParagraph();
          const nextType = unordered ? 'ul' : 'ol';
          if(!listOpen || listType !== nextType){
            closeList();
            listOpen = true;
            listType = nextType;
            html.push(`<${listType}>`);
          }
          html.push(`<li>${renderInlineMarkdown((unordered || ordered)[1])}</li>`);
          continue;
        }

        if(line.startsWith('>')){
          flushParagraph();
          closeList();
          html.push(`<blockquote>${renderInlineMarkdown(line.replace(/^>\s?/, ''))}</blockquote>`);
          continue;
        }

        paragraph.push(line);
      }

      if(codeOpen){
        html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
      }
      flushParagraph();
      closeList();
      return html.join('');
    }

    function isImageUrl(url){
      // 增加宽松度，有些 url 可能后面跟了奇怪的参数
      // 只要包含 .jpg .png 等扩展名，且后面是 ? # 或 结束，或者被某些标点截断前
      // 简单判断：路径部分以图片后缀结尾
      try {
        const u = new URL(url);
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(u.pathname);
      } catch (e) {
        // 如果 new URL 失败（比如相对路径或非法字符），退回正则匹配
        return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(url || '');
      }
    }

    function normalizeUrl(rawUrl){
      const s = String(rawUrl || '').trim();
      if(!s) return '';
      // 尽量保留原始 URL，但把空格编码，避免 img src 失败
      return s.replace(/\s/g, '%20');
    }

    function dedupeKeepOrder(arr){
      const seen = new Set();
      const out = [];
      for(const x of (Array.isArray(arr) ? arr : [])){
        const v = String(x || '');
        if(!v) continue;
        if(seen.has(v)) continue;
        seen.add(v);
        out.push(v);
      }
      return out;
    }

    function extractUrlsLoose(text){
      const s = String(text || '');
      // 简单正则提取：匹配 http/https 开头，直到遇到空白字符
      // [^\s] 包含中文、特殊符号等，直到遇到换行或空格
      const regex = /(https?:\/\/[^\s]+)/g;
      const matches = s.match(regex) || [];
      const urls = [];
      
      // 去除首尾标点
      const trimTailPunct = (u) => String(u || '').replace(/[)\]}'">，。,;；\]】）＞]+$/g, '');
      const trimHeadPunct = (u) => String(u || '').replace(/^[<([{'"]+|^[＜（【\[]+/g, '');

      for(const m of matches){
        let u = trimHeadPunct(trimTailPunct(m));
        // 简单清洗可能混入的结尾
        if(u) urls.push(u);
      }
      return dedupeKeepOrder(urls);
    }

    function parseImagesFromTextLoosely(text){
      const urls = extractUrlsLoose(text).filter(isImageUrl);
      return dedupeKeepOrder(urls);
    }

    function findLastImageMarkerIndex(raw){
      const s = String(raw || '');
      // 支持多种写法：【图片】、【 图片 】、[图片]、[ 图片 ]
      const re = /【\s*图片\s*】|\[\s*图片\s*\]/g;
      let m;
      let lastIdx = -1;
      let lastLen = 0;
      while((m = re.exec(s)) !== null){
        lastIdx = m.index;
        lastLen = m[0].length;
      }
      return { idx: lastIdx, len: lastLen };
    }

    function parseAnswerAndImages(text){
      const raw = String(text || '');
      const { idx, len } = findLastImageMarkerIndex(raw);
      if(idx === -1) return { text: raw, images: [] };

      const before = raw.slice(0, idx).trimEnd();
      const after = raw.slice(idx + len).trim();
      const urls = [];

      // 优先按“每行一个 URL”的方式解析，允许 URL 中包含空格
      const lines = after.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      for(const line of lines){
        if(line.startsWith('http://') || line.startsWith('https://')){
          urls.push(line);
        }else{
          // 兼容同一行包含多个 URL 的情况
          const matches = extractUrlsLoose(line);
          for(const u of matches){
            urls.push(u);
          }
        }
      }

      // 去重保序 + 过滤图片链接
      const seen = new Set();
      const images = [];
      for(const u of urls){
        const normalized = normalizeUrl(u);
        if(!isImageUrl(normalized)) continue;
        if(seen.has(normalized)) continue;
        seen.add(normalized);
        images.push(normalized);
      }
      return { text: before, images };
    }

    function shouldShowImagesByAnswer(answerText){
      const t = String(answerText || '');
      // 常见“需要看图/见图/如下图”的表述
      const keywords = [
        '如图', '如下图', '见图', '见下图', '下图', '上图',
        '图片', '示意图', '结构图', '外观', '接线图', '电路图', '原理图', '安装图', '尺寸图', '截图'
      ];
      return keywords.some(k => t.includes(k));
    }

    function renderAnswerWithImages(containerEl, answerText, candidateImageUrls){
      const { text, images: imagesFromBlock } = parseAnswerAndImages(answerText);
      const candidates = Array.isArray(candidateImageUrls)
        ? candidateImageUrls.map(normalizeUrl).filter(isImageUrl)
        : [];
      const hasBlockImages = imagesFromBlock && imagesFromBlock.length > 0;
      
      // 使用宽松提取
      const looseImages = extractUrlsLoose(answerText).map(normalizeUrl).filter(isImageUrl);
      
      // 只要后端给了候选图片，就展示（避免答案没写“如图”但用户仍需要看图）
      // 或者从文本里提取到了图片 URL
      const shouldShow = hasBlockImages || (candidates.length > 0) || (looseImages.length > 0);
      
      // 优先级：Block 显式标记 > 后端候选 > 文本宽松提取
      // 注意：这里做个并集可能更好，防止漏掉
      const allImages = new Set([
          ...(hasBlockImages ? imagesFromBlock : []),
          ...candidates,
          ...looseImages
      ]);
      const images = Array.from(allImages);

      containerEl.textContent = '';

      if((text || '').trim().length > 0){
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.innerHTML = renderMarkdown(text);
        containerEl.appendChild(textEl);
        typesetMath(textEl);
      }else{
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = '（已完成，但未返回答案）';
        containerEl.appendChild(textEl);
      }

      if(images && images.length > 0){
        const imgWrap = document.createElement('div');
        imgWrap.className = 'answer-images';
        for(const url of images){
          const safeUrl = normalizeUrl(url);
          const link = document.createElement('a');
          link.href = safeUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = url;
          link.style.display = 'none';

          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = safeUrl;
          img.alt = '参考图片';
          img.referrerPolicy = 'no-referrer';
          img.addEventListener('error', () => {
            img.style.display = 'none';
            link.style.display = 'inline';
          });
          imgWrap.appendChild(img);
          imgWrap.appendChild(link);
        }
        containerEl.appendChild(imgWrap);
      }
    }

    function renderProgress(botMsgEl, doneList, runningList, status){
      const details = botMsgEl.querySelector('details.progress');
      const summary = details.querySelector('summary');
      const ul = details.querySelector('ul');
      const done = Array.isArray(doneList) ? doneList : [];
      const running = Array.isArray(runningList) ? runningList : [];
      const totalDone = done.length;
      const totalRun = running.length;

      const statusMap = {
        'processing': '处理中',
        'completed': '已完成',
        'failed': '失败',
        'pending': '等待中',
      };
      const displayStatus = statusMap[status] || status || 'unknown';

      summary.textContent = `阶段进度（已完成${totalDone}，进行中${totalRun}，状态：${displayStatus}）`;

      const lines = [
        ...done.map(x => `✅ ${x}`),
        ...running.map(x => `⏳ ${x}`)
      ];
      ul.innerHTML = '';
      if(lines.length === 0){
        ul.insertAdjacentHTML('beforeend', '<li>暂无进度</li>');
      }else{
        for(const line of lines){
          ul.insertAdjacentHTML('beforeend', `<li>${escapeHtml(line)}</li>`);
        }
      }
    }

    function finalizeBotAnswer(botMsgEl, answer, error, imageUrls){
      const bubble = botMsgEl.querySelector('.bubble');
      const progress = botMsgEl.querySelector('details.progress');
      const err = (error || '').trim();

      if(err){
        const progressEl = progress ? progress : null;
        if(progressEl) {
            progressEl.remove();
            progressEl.removeAttribute('open');
        }
        bubble.textContent = '';
        const errEl = document.createElement('div');
        errEl.className = 'answer';
        errEl.textContent = `抱歉，本次处理失败：\n${err}`;
        bubble.appendChild(errEl);
        if(progressEl) bubble.appendChild(progressEl);
        return;
      }

      const progressEl = progress ? progress : null;
      if(progressEl) {
        progressEl.remove();
        progressEl.removeAttribute('open'); // 完成后自动收起
      }
      bubble.textContent = '';
      const answerEl = document.createElement('div');
      answerEl.className = 'answer';
      bubble.appendChild(answerEl);
      renderAnswerWithImages(answerEl, answer || '', imageUrls || []);
      if(progressEl) bubble.appendChild(progressEl);
    }

    function normalizeIncomingFile(file, source){
      if(!file) return null;
      const fallbackExt = (file.type || '').split('/')[1] || 'png';
      const name = file.name && file.name !== 'image.png'
        ? file.name
        : `${source || 'attachment'}-${new Date().toISOString().replace(/[:.]/g, '-')}.${fallbackExt}`;
      return new File([file], name, { type: file.type || 'application/octet-stream', lastModified: file.lastModified || Date.now() });
    }

    function fileKey(file){
      return `${file.name}|${file.size}|${file.lastModified || 0}`;
    }

    function addPendingFiles(files, source='attachment'){
      const incoming = Array.from(files || [])
        .map(file => normalizeIncomingFile(file, source))
        .filter(Boolean);
      if(incoming.length === 0) return;
      const seen = new Set(pendingFiles.map(fileKey));
      for(const file of incoming){
        if(pendingFiles.length >= MAX_PENDING_FILES) break;
        const key = fileKey(file);
        if(seen.has(key)) continue;
        pendingFiles.push(file);
        seen.add(key);
      }
      updateAttachmentHint();
      inputEl.focus();
    }

    function removePendingFile(index){
      pendingFiles.splice(index, 1);
      updateAttachmentHint();
    }

    function clearPendingFiles(){
      pendingFiles = [];
      queryFiles.value = '';
      updateAttachmentHint();
    }

    function getPendingFiles(){
      return pendingFiles.slice();
    }

    async function submitQuery(text){
      const isStream = streamToggle.checked;
      const files = getPendingFiles();
      let res;
      if(files.length > 0){
        const form = new FormData();
        form.append('query_text', text);
        form.append('session_id', sessionId);
        form.append('is_stream', String(isStream));
        form.append('course_id', currentCourseId || '');
        form.append('course_name', currentCourseName || '');
        form.append('mode', currentMode || 'qa');
        for(const file of files) form.append('files', file);
        res = await fetch(`${API_BASE}/query_with_files`, {
          method: 'POST',
          body: form
        });
      }else{
        res = await fetch(`${API_BASE}/query`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            query: text,
            session_id: sessionId,
            is_stream: isStream,
            course_id: currentCourseId,
            course_name: currentCourseName,
            mode: currentMode
          })
        });
      }
      if(!res.ok){
        const msg = await res.text();
        throw new Error(msg || '请求失败');
      }
      return await res.json();
    }

    function updateAttachmentHint(){
      const files = getPendingFiles();
      attachBtn.classList.toggle('has-files', files.length > 0);
      attachmentTray.classList.toggle('active', files.length > 0);
      attachmentTray.innerHTML = '';
      if(files.length > 0){
        files.forEach((file, index) => {
          const chip = document.createElement('span');
          chip.className = 'attachment-chip';

          const name = document.createElement('span');
          name.className = 'attachment-name';
          name.textContent = file.name;
          name.title = file.name;

          const remove = document.createElement('button');
          remove.className = 'attachment-remove';
          remove.type = 'button';
          remove.title = '移除附件';
          remove.textContent = '×';
          remove.addEventListener('click', () => removePendingFile(index));

          chip.appendChild(name);
          chip.appendChild(remove);
          attachmentTray.appendChild(chip);
        });
        const names = files.map(f => f.name).join('，');
        hintEl.textContent = `已添加 ${files.length} 个附件：${names}`;
      }else{
        hintEl.innerHTML = '快捷键：<span class="kbd">Enter</span> 发送，<span class="kbd">Shift</span>+<span class="kbd">Enter</span> 换行';
      }
    }

    async function poll(taskId, botMsgEl){
      const typing = botMsgEl.querySelector('.typing');
      const interval = setInterval(async () => {
        try{
          const res = await fetch(`${API_BASE}/status/${taskId}`);
          const data = await res.json();
          renderProgress(botMsgEl, data.done_list, data.running_list, data.status);

          if(data.status === 'completed'){
            if(typing) typing.remove();
            finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || []);
            clearInterval(interval);
            sendBtn.disabled = false;
          }else if(data.status === 'failed'){
            if(typing) typing.remove();
            finalizeBotAnswer(botMsgEl, data.answer, data.error || 'failed', data.image_urls || []);
            clearInterval(interval);
            sendBtn.disabled = false;
          }
        }catch(e){
          // 轮询错误不立刻终止，让用户稍后重试
        }
      }, 1200);
    }

        if (!isStream) {
          // 非流式：直接拿到结果
          // data: { session_id, answer, done_list, error, message }
          renderProgress(botMsgEl, data.done_list || [], [], 'completed');
          finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || []);
          sendBtn.disabled = false;
          return;
        }

        // 流式：SSE
        const { session_id } = data; // 此时 backend 返回 session_id
        
        const bubble = botMsgEl.querySelector('.bubble');
        let answerEl = bubble.querySelector('.answer');
        if(!answerEl){
          answerEl = document.createElement('div');
          answerEl.className = 'answer';
          bubble.insertBefore(answerEl, bubble.firstChild);
        }

        const es = new EventSource(`${API_BASE}/stream/${session_id}`);
        console.log('[perf] C EventSource created', performance.now(), { session_id });
        let rawAnswerText = '';
        let previewTimer = null;
        function scheduleStreamingPreview(){
          if(previewTimer) return;
          previewTimer = setTimeout(() => {
            previewTimer = null;
            renderStreamingPreview(answerEl, rawAnswerText);
            scrollToBottom();
          }, 120);
        }
        function cancelStreamingPreview(){
          if(previewTimer){
            clearTimeout(previewTimer);
            previewTimer = null;
          }
        }

        es.addEventListener('progress', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            renderProgress(botMsgEl, d.done_list, d.running_list, d.status);
            // 当进度状态已完成时，提前结束“...”等待态
            if(d && d.status === 'completed'){
              const typing = botMsgEl.querySelector('.typing');
              if(typing) typing.remove();
              // 防止后端未发送 final 导致按钮一直禁用
              sendBtn.disabled = false;
            }
          }catch(_){}
        });

        es.addEventListener('delta', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            const delta = d.delta || '';
            if(delta){
              rawAnswerText += delta;
              scheduleStreamingPreview();
            }
          }catch(_){}
        });

        es.addEventListener('final', (e) => {
          cancelStreamingPreview();
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          // 收起进度条
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');
          
          try{
            const d = JSON.parse(e.data || '{}');
            // 流式 delta 可能不包含“【图片】/图片列表”，最终包的 d.answer 才是完整答案；优先使用 d.answer
            const finalText = (d && typeof d.answer === 'string' && d.answer.trim().length > 0) ? d.answer : (rawAnswerText || answerEl.textContent || '');
            renderAnswerWithImages(answerEl, finalText, d.image_urls || []);
          }catch(_){}
          es.close();
          sendBtn.disabled = false;
        });

        es.addEventListener('final_answer', (e) => {
          cancelStreamingPreview();
           // 响应用户的 final_answer 信号，确保图片渲染
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');
          
          try{
            const d = JSON.parse(e.data || '{}');
            const finalText = (d && typeof d.answer === 'string' && d.answer.trim().length > 0) ? d.answer : (rawAnswerText || answerEl.textContent || '');
            renderAnswerWithImages(answerEl, finalText, d.image_urls || []);
          }catch(_){}
          es.close();
          sendBtn.disabled = false;
        });

        es.addEventListener('error', (e) => {
          cancelStreamingPreview();
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          // 收起进度条
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');

          try{
            const msg = e && e.data ? (JSON.parse(e.data).error || 'SSE 连接中断/失败') : 'SSE 连接中断/失败';
            rawAnswerText += `\n\n（错误：${msg}）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }catch(_){
            rawAnswerText += `\n\n（错误：SSE 连接中断/失败）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }
          es.close();
          sendBtn.disabled = false;
        });
      }catch(e){
        const bubble = botMsgEl.querySelector('.bubble');
        const progress = botMsgEl.querySelector('details.progress');
        const typing = botMsgEl.querySelector('.typing');
        if(typing) typing.remove();
        bubble.innerHTML = `请求失败：${escapeHtml(e.message || e)}\n\n` + progress.outerHTML;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', onSend);
    attachBtn.addEventListener('click', () => queryFiles.click());
    queryFiles.addEventListener('change', () => {
      addPendingFiles(queryFiles.files, 'selected-file');
      queryFiles.value = '';
    });
    document.addEventListener('paste', (e) => {
      let files = Array.from(e.clipboardData?.files || []);
      if(files.length === 0){
        files = Array.from(e.clipboardData?.items || [])
          .filter(item => item.kind === 'file')
          .map(item => item.getAsFile())
          .filter(Boolean);
      }
      if(files.length === 0) return;
      e.preventDefault();
      addPendingFiles(files, 'pasted-image');
    });
    document.addEventListener('dragenter', (e) => {
      if(!e.dataTransfer || Array.from(e.dataTransfer.types || []).indexOf('Files') === -1) return;
      e.preventDefault();
      dragDepth += 1;
      appEl.classList.add('drag-over');
    });
    document.addEventListener('dragover', (e) => {
      if(!e.dataTransfer || Array.from(e.dataTransfer.types || []).indexOf('Files') === -1) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });
    document.addEventListener('dragleave', (e) => {
      if(!e.dataTransfer || Array.from(e.dataTransfer.types || []).indexOf('Files') === -1) return;
      dragDepth = Math.max(0, dragDepth - 1);
      if(dragDepth === 0) appEl.classList.remove('drag-over');
    });
    document.addEventListener('drop', (e) => {
      const files = Array.from(e.dataTransfer?.files || []);
      if(files.length === 0) return;
      e.preventDefault();
      dragDepth = 0;
      appEl.classList.remove('drag-over');
      addPendingFiles(files, 'dropped-file');
    });
    courseSelect.addEventListener('change', () => {
      const opt = courseSelect.selectedOptions[0];
      currentCourseId = courseSelect.value;
      currentCourseName = opt ? (opt.dataset.name || opt.textContent || currentCourseId) : currentCourseId;
      localStorage.setItem('kb_course_id', currentCourseId);
      localStorage.setItem('kb_course_name', currentCourseName);
      updateAssistantBrand();
      loadHistory();
    });
    btnCreateCourse.addEventListener('click', openImportPage);
    modeQa.addEventListener('click', () => setMode('qa'));
    modeExam.addEventListener('click', () => setMode('exam'));
    inputEl.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        onSend();
      }
    });
    btnClear.addEventListener('click', async () => {
      if(!confirm('确定要清空当前会话的历史记录吗？这将无法恢复。')) return;

      try {
        const res = await fetch(`${API_BASE}/history/${sessionId}`, { method: 'DELETE' });
        if(!res.ok) {
           console.error("Failed to clear history backend, status:", res.status);
           alert('服务端清空失败，仅清空本地显示');
        }
      } catch(e) {
        console.error("Failed to clear history backend", e);
        alert('服务端清空失败，仅清空本地显示');
      }

      // 清空除首条欢迎消息外的内容
      const nodes = Array.from(chatEl.querySelectorAll('.msg'));
      for(let i=1;i<nodes.length;i++) nodes[i].remove();
      scrollToBottom();
    });

    apiHealth();
    setInterval(apiHealth, 5000);
    setMode(currentMode);
    updateAssistantBrand();
    loadCourses().then(loadHistory);
    setTimeout(() => inputEl.focus(), 200);
  </script>
</body>
</html>
